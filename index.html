<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking Elastic String</title>
    
    <!-- Step 2: The Tools (MediaPipe libraries via CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Mirror the canvas so it acts like a real mirror */
        canvas {
            transform: scaleX(-1);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
        }
        /* Hide the raw video feed, we will draw it directly on the canvas */
        video {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Step 1 & 4: Camera input and Canvas output -->
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // Step 5: Smooth Interaction Physics (Lerping variables)
        let smoothedLeftX = 0, smoothedLeftY = 0;
        let smoothedRightX = 0, smoothedRightY = 0;

        function onResults(results) {
            // Set canvas dimensions to match video
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            // 1. Draw the camera feed so your face is visible
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. Check if hands are detected
            if (results.multiHandLandmarks && results.multiHandLandmarks.length >= 2) {
                
                // Get the index finger tips (Landmark 8) of the first two hands detected
                const hand1 = results.multiHandLandmarks[0][8];
                const hand2 = results.multiHandLandmarks[1][8];

                // Convert normalized coordinates (0 to 1) to actual canvas pixels
                const targetX1 = hand1.x * canvasElement.width;
                const targetY1 = hand1.y * canvasElement.height;
                const targetX2 = hand2.x * canvasElement.width;
                const targetY2 = hand2.y * canvasElement.height;

                // Step 5: Apply simple easing/physics to make movement feel organic
                smoothedLeftX += (targetX1 - smoothedLeftX) * 0.3;
                smoothedLeftY += (targetY1 - smoothedLeftY) * 0.3;
                smoothedRightX += (targetX2 - smoothedRightX) * 0.3;
                smoothedRightY += (targetY2 - smoothedRightY) * 0.3;

                // Calculate distance between fingers to calculate "tension"
                const dx = smoothedRightX - smoothedLeftX;
                const dy = smoothedRightY - smoothedLeftY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Step 3 & 5: Draw the Elastic Band
                // Tension logic: The further apart, the thinner and redder it gets
                const maxDistance = 600; // Adjust based on arm span
                const tension = Math.min(distance / maxDistance, 1);
                
                const bandThickness = Math.max(2, 15 - (tension * 10)); // Gets thinner as stretched
                
                // Color shifts from Cyan (relaxed) to Neon Pink (stretched)
                const r = Math.floor(0 + (255 * tension));
                const g = Math.floor(255 - (200 * tension));
                const b = 255;

                // Glowing aesthetic
                canvasCtx.shadowBlur = 20;
                canvasCtx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                
                // Draw the line
                canvasCtx.beginPath();
                canvasCtx.moveTo(smoothedLeftX, smoothedLeftY);
                canvasCtx.lineTo(smoothedRightX, smoothedRightY);
                canvasCtx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
                canvasCtx.lineWidth = bandThickness;
                canvasCtx.lineCap = 'round';
                canvasCtx.stroke();

                // Draw glowing nodes on the fingers
                canvasCtx.beginPath();
                canvasCtx.arc(smoothedLeftX, smoothedLeftY, 10, 0, 2 * Math.PI);
                canvasCtx.arc(smoothedRightX, smoothedRightY, 10, 0, 2 * Math.PI);
                canvasCtx.fillStyle = 'white';
                canvasCtx.fill();
            }
            canvasCtx.restore();
        }

        // Initialize MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        // Set tracking parameters
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1, // 0 is fast, 1 is accurate
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // Turn on the webcam
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

    </script>
</body>
</html>
